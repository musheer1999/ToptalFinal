<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" href="/logo.png" />
    <meta name="theme-color" content="#FF6B35" />
    <meta name="description" content="ToptalMeals - Food Delivery App" />
    <title>ToptalMeals</title>
    <!-- Google Fonts: Inter for clean modern typography -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
      /* Base reset so no browser default styles interfere */
      *, *::before, *::after { box-sizing: border-box; }
      body { margin: 0; background: #F7F8FC; }
      /* Loading state before React mounts */
      #root { min-height: 100vh; }
    </style>
  </head>
  <body>
    <!-- React mounts here. The App component fills this div. -->
    <div id="root"></div>
  </body>
</html>
